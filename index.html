<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>BaaS - Доп. функции</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f4f7f6; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { width: 100%; max-width: 500px; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px;}
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { background: #007bff; color: white; border: none; padding: 12px; border-radius: 6px; width: 100%; font-weight: 600; cursor: pointer; transition: 0.3s; margin-top: 5px; }
        button:hover { background: #0056b3; }
        .btn-secondary { background: #28a745; }
        .btn-secondary:hover { background: #218838; }
        .post { background: #fff; border: 1px solid #eaeaea; padding: 15px; margin-top: 15px; border-radius: 8px; width: 100%; max-width: 500px; position: relative; }
        .like-btn { cursor: pointer; border: none; background: #f8f9fa; padding: 5px 12px; border-radius: 20px; font-size: 14px; width: auto; color: black; font-weight: normal;}
        .like-btn:hover { background: #e2e6ea; }
        .time { font-size: 11px; color: #999; float: right; }
        .doc-id { font-size: 10px; color: #aaa; margin-left: 10px; font-family: monospace; }
        hr { border: 0; border-top: 1px solid #eee; margin: 20px 0; }
    </style>
</head>
<body>

<div class="container">
    <h3>Панель управления данными</h3>
    <input type="text" id="name" placeholder="Имя профиля">
    <input type="email" id="email" placeholder="Рабочий Email">
    <button id="mainBtn">Опубликовать в облако</button>
</div>

<div class="container">
    <h3>Дополнительные функции</h3>
    
    <b>1. Обновить Email пользователя</b>
    <input type="text" id="updateId" placeholder="Скопируйте ID документа из ленты ниже">
    <input type="email" id="updateEmail" placeholder="Новый Email">
    <button id="updateBtn">Обновить Email</button>

    <hr>

    <b>2. Найти популярные посты</b>
    <button id="queryBtn" class="btn-secondary">Показать посты, где > 5 лайков</button>
</div>

<div id="feed" style="width: 100%; max-width: 500px;"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import { 
        getFirestore, collection, addDoc, query, orderBy, onSnapshot, 
        serverTimestamp, updateDoc, doc, increment, where, getDocs 
    } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

    // ТВОИ КЛЮЧИ FIREBASE
    const firebaseConfig = {
      apiKey: "AIzaSyDGE5HQ-pJ9lOS_LUGHrUTTsdULUT0wVWM",
      authDomain: "university-project-1106d.firebaseapp.com",
      projectId: "university-project-1106d",
      storageBucket: "university-project-1106d.firebasestorage.app",
      messagingSenderId: "891409091301",
      appId: "1:891409091301:web:bca5c423346e091817a20c"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    window.db = db; 

    // МЕТОД: АТОМАРНОЕ ОБНОВЛЕНИЕ (LIKES)
    window.processLike = async (id) => {
        const docRef = doc(db, "requests", id);
        try {
            await updateDoc(docRef, { likes: increment(1) });
        } catch (e) { console.error("Validation Error:", e.message); }
    };

    // МЕТОД: ЗАПИСЬ С ВАЛИДАЦИЕЙ
    document.getElementById('mainBtn').onclick = async () => {
        const btn = document.getElementById('mainBtn');
        btn.disabled = true;
        try {
            await addDoc(collection(db, "requests"), {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                likes: 0,
                timestamp: serverTimestamp()
            });
            document.getElementById('email').value = "";
        } catch (e) { alert("Ошибка безопасности: Данные отклонены сервером."); }
        btn.disabled = false;
    };

    // --- НОВАЯ ФУНКЦИЯ 1: ОБНОВЛЕНИЕ ДОКУМЕНТА ---
    document.getElementById('updateBtn').onclick = async () => {
        const docId = document.getElementById('updateId').value;
        const newEmail = document.getElementById('updateEmail').value;
        
        if (!docId || !newEmail) return alert("Пожалуйста, заполните ID и новый Email.");

        try {
            const docRef = doc(db, "requests", docId);
            await updateDoc(docRef, { email: newEmail });
            alert(`Успешно! Email для ID ${docId} обновлен.`);
            document.getElementById('updateId').value = "";
            document.getElementById('updateEmail').value = "";
        } catch (error) {
            alert("Ошибка при обновлении. Возможно, нет прав доступа.\n" + error.message);
        }
    };

    // --- НОВАЯ ФУНКЦИЯ 2: ФИЛЬТРАЦИЯ ДАННЫХ ---
    document.getElementById('queryBtn').onclick = async () => {
        // Создаем запрос: искать в коллекции "requests" те, где likes > 5
        const q = query(collection(db, "requests"), where("likes", ">", 5));
        
        try {
            const querySnapshot = await getDocs(q);
            if (querySnapshot.empty) {
                alert("Пока нет постов, у которых больше 5 лайков!");
                return;
            }

            let resultText = "🔥 ПОПУЛЯРНЫЕ ПОСТЫ:\n\n";
            querySnapshot.forEach((doc) => {
                resultText += `Имя: ${doc.data().name} | Лайков: ${doc.data().likes}\n`;
            });
            alert(resultText);
        } catch (error) {
            alert("Ошибка при поиске: " + error.message);
        }
    };

    // МЕТОД: REAL-TIME СИНХРОНИЗАЦИЯ (с выводом ID)
    const qFeed = query(collection(db, "requests"), orderBy("timestamp", "desc"));
    onSnapshot(qFeed, (snapshot) => {
        const feed = document.getElementById('feed');
        feed.innerHTML = "";
        snapshot.forEach((doc) => {
            const data = doc.data();
            feed.innerHTML += `
                <div class="post">
                    <span class="time">${data.timestamp ? data.timestamp.toDate().toLocaleTimeString() : '...'}</span>
                    <b>${data.name}</b> <span class="doc-id">(ID: ${doc.id})</span>
                    <p style="margin: 5px 0; color: #555;">${data.email}</p>
                    <button class="like-btn" onclick="processLike('${doc.id}')">👍 ${data.likes || 0}</button>
                </div>
            `;
        });
    });
</script>
</body>
</html>
